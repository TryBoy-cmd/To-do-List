<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Tugas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #F7F6F2; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #fff; border: 1px solid #ebe9e3; border-radius: 16px; padding: 2rem; width: 100%; max-width: 440px; }
    h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 1.5rem; }
    label { display: block; font-size: .73rem; color: #aaa; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .45rem; }
    input[type="text"], input[type="date"] {
      width: 100%; padding: .65rem .9rem;
      border: 1px solid #e5e3dd; border-radius: 9px;
      font-size: .9rem; font-family: inherit;
      background: #faf9f7; margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #999; background: #fff; }
    .actions { display: flex; gap: .6rem; }
    .btn { flex: 1; padding: .65rem; border: none; border-radius: 9px; cursor: pointer; font-size: .88rem; font-family: inherit; font-weight: 500; text-align: center; text-decoration: none; display: inline-block; transition: background .15s; }
    .btn-primary { background: #1a1a1a; color: #fff; }
    .btn-primary:hover { background: #333; }
    .btn-ghost { background: #f0efeb; color: #666; }
    .btn-ghost:hover { background: #e8e6e0; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Edit Tugas</h2>
    <form method="POST">
      <label>Judul Tugas</label>
      <input type="text" name="title" value="{{ task.title }}" required autofocus/>
      <label>Deadline</label>
      <input type="date" name="deadline" value="{{ task.deadline.strftime('%Y-%m-%d') if task.deadline else '' }}"/>
      <div class="actions">
        <a href="/" class="btn btn-ghost">Batal</a>
        <button type="submit" class="btn btn-primary">Simpan</button>
      </div>
    </form>
  </div>
</body>
</html>
